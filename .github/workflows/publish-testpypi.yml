name: "Test: Publish to TestPyPI"

# Manual trigger restricted to the maintainer account only.
# Used exclusively for pre-release validation before a real PyPI publish.
on:
  workflow_dispatch:

jobs:
  verify-actor:
    name: Verify actor
    runs-on: ubuntu-latest
    steps:
      - name: Block unauthorised callers
        if: ${{ github.triggering_actor != 'mrhenrike' }}
        run: |
          echo "::error::Unauthorised actor: ${{ github.triggering_actor }}."
          exit 1

  test-publish:
    runs-on: ubuntu-latest
    needs: verify-actor
    environment:
      name: testpypi
      url: https://test.pypi.org/p/mikrotikapi-bf

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build twine

      - run: python -m build

      - name: Verify package integrity
        run: twine check dist/*

      - name: Publish to TestPyPI (OIDC — no stored token)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
