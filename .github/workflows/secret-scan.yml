name: "Secret & Credential Leak Guard"

# Runs on every push/PR to main to prevent accidental commit of secrets,
# tokens, .env files or API keys into the public repository.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  secret-scan:
    name: Scan for leaked credentials
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for accurate diff scanning

      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks (no-git mode on changed files)
        run: |
          gitleaks detect --source . --no-git --redact --exit-code 1
        continue-on-error: false

      - name: Block .env files in staging area
        run: |
          # Fail if a real .env (not .env.example) was ever committed
          if git log --all --name-only --pretty=format: | grep -E '^\.env$'; then
            echo "::error::.env file found in git history. Remove it and rotate any exposed secrets."
            exit 1
          fi
          echo "No .env files found in history."
